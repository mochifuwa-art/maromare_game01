<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f1119" />
  <title>APTITUDE</title>
  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>
  <div id="app">

    <!-- 縦持ち時の回転案内 -->
    <div id="rotate-notice">
      <div class="rotate-inner">
        <div class="rotate-icon">📱</div>
        <p class="rotate-text">スマホを<strong>横向き</strong>にしてね</p>
        <p class="rotate-sub">横画面でプレイするゲームです</p>
      </div>
    </div>

    <!-- Title -->
    <section id="title-screen" class="screen active">
      <div class="title-wrap">
        <h1 class="title-main">APTITUDE</h1>
        <p class="title-sub">得意なことほど、コストがかからない</p>
        <div class="title-buttons">
          <button class="primary-btn big-btn" id="start-btn">▶ あたらしい冒険</button>
          <button class="secondary-btn" id="continue-btn" style="display:none">⏵ つづきから</button>
          <button class="secondary-btn" id="records-btn">📖 きろく・ずかん</button>
        </div>
        <div id="title-stats" class="title-stats"></div>
        <div class="title-hint">
          <span>🔥火</span><span>💧水</span><span>💨風</span><span>🪨土</span>
          <p>4属性の適性でコストが変わるカードバトル</p>
        </div>
      </div>
      <button id="mute-btn-title" class="mute-btn-corner" title="サウンド切替">🔊</button>
    </section>

    <!-- Character Select -->
    <section id="character-select-screen" class="screen">
      <h2 class="screen-title">仲間をえらぶ</h2>
      <p class="screen-sub">得意属性のカードが安く撃てる。クセを見て選ぼう</p>
      <div id="character-choices" class="choices-row"></div>
    </section>

    <!-- Combat -->
    <section id="combat-screen" class="screen">
      <!-- 上部バー -->
      <div class="top-bar">
        <div class="top-left">
          <span id="stage-label" class="stage-chip">1-1</span>
          <span id="run-progress" class="progress-chip"></span>
        </div>
        <div id="turn-counter" class="turn-chip">残り — ターン</div>
        <button id="mute-btn" class="mute-btn">🔊</button>
      </div>

      <!-- バトルステージ -->
      <div class="battle-stage">
        <!-- 左: キャラ -->
        <div class="side-col side-left">
          <div id="character-panel" class="character-panel"></div>
        </div>

        <!-- 中央: 敵 + エフェクト -->
        <div class="center-stage" id="center-stage">
          <div class="enemy-zone">
            <div id="enemy-visual" class="enemy-visual"></div>
            <div class="enemy-info">
              <div id="enemy-name" class="enemy-name"></div>
              <div class="hp-bar-wrap big">
                <div id="enemy-hp-fill" class="hp-bar-fill"></div>
                <div id="enemy-hp-text" class="hp-bar-text"></div>
              </div>
              <div id="enemy-affinity" class="enemy-affinity"></div>
            </div>
          </div>
          <div id="effect-layer" class="effect-layer"></div>
          <div id="battle-message" class="battle-message"></div>
        </div>

        <!-- 右: MP/デッキ -->
        <div class="side-col side-right">
          <div class="mp-block">
            <div class="mp-label">MP</div>
            <div class="mp-bar-wrap">
              <div id="mp-fill" class="mp-bar-fill"></div>
              <div id="mp-text" class="mp-bar-text"></div>
            </div>
          </div>
          <div class="deck-block">
            <div class="deck-stat" title="これから引くカードの残り">🂠 ひく山 <strong id="draw-count">0</strong></div>
            <div class="deck-stat" title="使った・交換したカード（山札が尽きると戻る）">🗑 すて札 <strong id="discard-count">0</strong></div>
          </div>
          <div id="focus-indicator" class="focus-indicator hidden">🎯 集中中<br>次撃+20</div>
        </div>
      </div>

      <!-- 手札ドック -->
      <div class="hand-dock">
        <div id="hand-area" class="hand-area"></div>
        <div class="action-col">
          <button id="execute-btn" class="primary-btn execute-btn" disabled>⚡ こうげき</button>
          <button id="swap-btn" class="secondary-btn swap-btn" disabled>🔄 こうかん (2)</button>
          <button id="end-turn-btn" class="secondary-btn end-btn">ターン終了</button>
        </div>
      </div>

      <!-- キャラ詳細 -->
      <div id="detail-panel" class="detail-panel hidden">
        <div class="detail-content">
          <button class="close-btn" id="close-detail">×</button>
          <div id="detail-body"></div>
        </div>
      </div>
    </section>

    <!-- Reward -->
    <section id="reward-screen" class="screen">
      <h2 class="screen-title">🎁 カード報酬</h2>
      <p class="screen-sub">1枚えらんでデッキに加える</p>
      <div id="reward-choices" class="choices-row"></div>
      <button id="skip-reward-btn" class="secondary-btn">スキップ</button>
    </section>

    <!-- Shop -->
    <section id="shop-screen" class="screen">
      <h2 class="screen-title">🏪 ショップ</h2>
      <div class="shop-gold">所持 <strong id="shop-gold">0</strong> G</div>
      <div id="shop-items" class="choices-row"></div>
      <div class="shop-actions">
        <button id="remove-card-btn" class="secondary-btn">🗑 カード除外 (30G)</button>
        <button id="leave-shop-btn" class="primary-btn">出発する ▶</button>
      </div>
      <div id="remove-list" class="remove-list hidden">
        <h3>除外するカードをえらぶ</h3>
        <div id="remove-cards" class="choices-row"></div>
        <button id="cancel-remove-btn" class="secondary-btn">やめる</button>
      </div>
    </section>

    <!-- End -->
    <section id="end-screen" class="screen">
      <div id="confetti-layer" class="confetti-layer"></div>
      <h2 id="end-title" class="end-title"></h2>
      <p id="end-message" class="screen-sub"></p>
      <button id="restart-btn" class="primary-btn big-btn">タイトルへ</button>
    </section>

    <!-- 記録・図鑑モーダル -->
    <div id="records-panel" class="detail-panel hidden">
      <div class="detail-content records-content">
        <button class="close-btn" id="close-records">×</button>
        <div id="records-body"></div>
      </div>
    </div>

  </div>

  <script src="game.js?v=6"></script>
</body>
</html>
